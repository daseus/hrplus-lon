server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Säkerhetsheaders motsvarande dist/_headers (Cloudflare). always = även på fel.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'none'" always;
    # Index och allt annat ska revalideras så uppdateringar slår igenom.
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;

    # Versionerade/oföränderliga assets får cachas länge. add_header i location
    # ersätter ärvda headers, så säkerhetsheadrarna upprepas här.
    location /assets/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'none'" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # SPA-fallback (motsvarar wrangler not_found_handling: single-page-application).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
