name: Tester

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Kör testsvit
        run: node --test
      - name: Typkontroll (tsc --checkJs)
        run: npx -y -p typescript tsc --noEmit -p tsconfig.json
